<!-- 
  ossec-snippets.conf
  Trechos relevantes do /var/ossec/etc/ossec.conf
  
  IMPORTANTE: Este arquivo contém apenas os blocos adicionados/modificados.
  Não substitua o ossec.conf completo por este conteúdo.
  Adicione os blocos abaixo dentro da tag <ossec_config> existente.
-->

<!-- =========================================================
     LOGS DO AGENTE (laptop)
     Arquivo: /var/ossec/etc/ossec.conf NO LAPTOP
     ========================================================= -->

<ossec_config>

  <!-- Logs gerais do sistema -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>

  <!-- Autenticação: SSH, sudo, PAM -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <!-- Logs do kernel -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/kern.log</location>
  </localfile>

  <!-- Apache (se instalado) -->
  <!-- 
  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/apache2/access.log</location>
  </localfile>
  -->

</ossec_config>


<!-- =========================================================
     INTEGRAÇÃO COM SURICATA
     Arquivo: /var/ossec/etc/ossec.conf NO SERVIDOR
     ========================================================= -->

<ossec_config>

  <!-- eve.json do Suricata — formato JSON -->
  <localfile>
    <log_format>json</log_format>
    <location>/var/log/suricata/eve.json</location>
  </localfile>

</ossec_config>


<!-- =========================================================
     NOTAS
     ========================================================= -->

<!--
  Após qualquer alteração no agente:
    sudo systemctl restart wazuh-agent

  Após qualquer alteração no servidor:
    sudo systemctl restart wazuh-manager

  Verificar se o agente está enviando logs:
    sudo /var/ossec/bin/agent_control -l

  Verificar logs do manager em tempo real:
    sudo tail -f /var/ossec/logs/ossec.log
-->
